<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Frost — Page Not Found" />
  <title>Frost — Page Not Found</title>

  <!-- Google Fonts (same as index) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Manrope", sans-serif;
      background: linear-gradient(135deg, #f7fbff, #ffffff);
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .error-container {
      max-width: 600px;
      animation: fadeIn 0.8s ease-in-out;
    }

    .logo {
      font-family: "Lora", serif;
      font-size: 40px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .logo span {
      color: #7dd3fc;
    }

    h1 {
      font-size: 110px;
      margin: 0;
      color: #38bdf8;
      line-height: 1;
    }

    h2 {
      margin: 10px 0 15px;
      font-size: 28px;
      font-weight: 600;
    }

    p {
      color: #6b7280;
      font-size: 16px;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #38bdf8;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      transition: 0.3s ease;
    }

    .btn:hover {
      background: #0ea5e9;
      transform: translateY(-2px);
    }

    .icecream {
      font-size: 60px;
      margin-bottom: 15px;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .footer-text {
      margin-top: 25px;
      font-size: 13px;
      color: #9ca3af;
    }
  </style>
</head>

<body>

  <div class="error-container">
    
    <div class="logo">Fr<span>o</span>st</div>

    <div class="icecream">🍦</div>

    <h1>404</h1>
    <h2>Oops! This scoop melted away.</h2>

    <p>
      The page you’re looking for doesn’t exist or has been moved.
      Let’s get you back to something sweet.
    </p>

    <a class="btn" href="index.html">Back to Home</a>

    <div class="footer-text">
      If you think this is a mistake, please check the URL and try again.
    </div>

  </div>

</body>
</html>
